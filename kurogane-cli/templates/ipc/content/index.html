<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kurogane: IPC template</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    :root {
      --bg: #0f1115;
      --panel: #171923;
      --text: #e6e6e6;
      --muted: #9aa0a6;
      --accent: #4f8cff;
    }

    * {
      box-sizing: border-box;
      font-family: system-ui, -apple-system, sans-serif;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      display: grid;
      place-items: center;
      height: 100vh;
    }

    main {
      width: 420px;
    }

    h1 {
      margin: 0 0 4px;
      font-size: 20px;
    }

    .subtitle {
      margin: 0 0 20px;
      color: var(--muted);
      font-size: 13px;
    }

    .card {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    button {
      flex: 1;
      padding: 10px;
      background: var(--panel);
      border: 1px solid #222;
      color: var(--text);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    button:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    pre {
      background: var(--panel);
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      min-height: 100px;
      overflow: auto;
    }
  </style>
</head>
<body>
  <main>
    <h1>Kurogane: IPC template</h1>
    <p class="subtitle">Send and handle messages between UI and native Rust</p>

    <div class="card">
      <button onclick="ping()">Ping</button>
      <button onclick="greet()">Greet</button>
      <button onclick="divide()">Divide</button>
    </div>

    <pre id="output">Ready…</pre>
  </main>

    <script>
    const out = document.getElementById("output");

    function setOutput(value) {
        out.textContent =
        typeof value === "string"
            ? value
            : JSON.stringify(value, null, 2);
    }

    async function ping() {
        const res = await kurogane.invoke("ping");
        setOutput(res); // "pong"
    }

    async function greet() {
        const res = await kurogane.invoke("greet", "Alice");
        setOutput(res); // "Hello, Alice"
    }

    async function divide() {
        try {
        const res = await kurogane.invoke("divide", { a: 10, b: 2 });
        setOutput(`${10} ÷ ${2} = ${res}`);
        } catch (e) {
        setOutput("Error: " + e);
        }
    }
    </script>
</body>
</html>
