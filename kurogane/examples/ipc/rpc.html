<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPC Demo - Complete Test Suite</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }
        
        .subtitle {
            opacity: 0.9;
            font-size: 1.1em;
        }
        
        .controls {
            padding: 30px;
            border-bottom: 1px solid #eee;
        }
        
        .button-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            margin-top: 20px;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .output-section {
            padding: 30px;
        }
        
        .output {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 20px;
            border-radius: 8px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 13px;
            line-height: 1.6;
            max-height: 400px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        
        .output::-webkit-scrollbar {
            width: 8px;
        }
        
        .output::-webkit-scrollbar-track {
            background: #2d2d2d;
            border-radius: 4px;
        }
        
        .output::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 4px;
        }
        
        .success {
            color: #4ec9b0;
        }
        
        .error {
            color: #f48771;
        }
        
        .info {
            color: #dcdcaa;
        }
        
        .separator {
            color: #6a6a6a;
            margin: 10px 0;
        }
        
        .timestamp {
            color: #858585;
            font-size: 11px;
        }
        
        .stats {
            display: flex;
            justify-content: space-around;
            padding: 20px;
            background: #f8f9fa;
            margin-top: 20px;
            border-radius: 8px;
        }
        
        .stat {
            text-align: center;
        }
        
        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-label {
            font-size: 0.9em;
            color: #666;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 IPC Test Suite</h1>
            <div class="subtitle">Comprehensive Testing for window.core.invoke()</div>
        </header>
        
        <div class="controls">
            <h2 style="margin-bottom: 15px; color: #333;">Test Commands</h2>
            <div class="button-grid">
                <button onclick="testEcho()">📢 Echo Test</button>
                <button onclick="testGreet()">👋 Greet Test</button>
                <button onclick="testMath()">🔢 Math Test</button>
                <button onclick="testError()">⚠️ Error Handling</button>
                <button onclick="testSpecialChars()">🔤 Special Characters</button>
                <button onclick="testParallel()">⚡ Parallel Execution</button>
                <button onclick="testUnknown()">❓ Unknown Command</button>
                <button onclick="testPerformance()">⏱️ Performance Test</button>
                <button onclick="clearOutput()">🗑️ Clear Output</button>
                <button onclick="runAllTests()">✨ Run All Tests</button>
            </div>
        </div>
        
        <div class="output-section">
            <h2 style="margin-bottom: 15px; color: #333;">Console Output</h2>
            <div class="output" id="output">Waiting for tests...</div>
            
            <div class="stats">
                <div class="stat">
                    <div class="stat-value" id="successCount">0</div>
                    <div class="stat-label">Tests Passed</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="failCount">0</div>
                    <div class="stat-label">Tests Failed</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="avgLatency">0ms</div>
                    <div class="stat-label">Avg Latency</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let successCount = 0;
        let failCount = 0;
        let latencies = [];
        
        function log(message, type = 'info') {
            const output = document.getElementById('output');
            const timestamp = new Date().toLocaleTimeString();
            const className = type;
            
            const line = `<span class="timestamp">[${timestamp}]</span> <span class="${className}">${message}</span>`;
            
            if (output.textContent === 'Waiting for tests...') {
                output.innerHTML = line;
            } else {
                output.innerHTML += '\n' + line;
            }
            
            output.scrollTop = output.scrollHeight;
            console.log(`[${timestamp}] ${message}`);
        }
        
        function separator() {
            log('─'.repeat(80), 'separator');
        }
        
        function updateStats() {
            document.getElementById('successCount').textContent = successCount;
            document.getElementById('failCount').textContent = failCount;
            
            if (latencies.length > 0) {
                const avg = latencies.reduce((a, b) => a + b, 0) / latencies.length;
                document.getElementById('avgLatency').textContent = avg.toFixed(1) + 'ms';
            }
        }
        
        async function measureLatency(fn) {
            const start = performance.now();
            await fn();
            const end = performance.now();
            const latency = end - start;
            latencies.push(latency);
            return latency;
        }
        
        async function testEcho() {
            log('🧪 Testing Echo Command...', 'info');
            try {
                const latency = await measureLatency(async () => {
                    const result = await window.core.invoke("echo", "Hello World");
                    if (result === "Echo: Hello World") {
                        log(`✅ Echo test passed: "${result}"`, 'success');
                        successCount++;
                    } else {
                        log(`❌ Echo test failed: Expected "Echo: Hello World", got "${result}"`, 'error');
                        failCount++;
                    }
                });
                log(`⏱️  Latency: ${latency.toFixed(2)}ms`, 'info');
            } catch (error) {
                log(`❌ Echo test error: ${error}`, 'error');
                failCount++;
            }
            updateStats();
        }
        
        async function testGreet() {
            log('🧪 Testing Greet Command...', 'info');
            try {
                const latency = await measureLatency(async () => {
                    const result = await window.core.invoke("greet", "Alice");
                    if (result === "Hello, Alice!") {
                        log(`✅ Greet test passed: "${result}"`, 'success');
                        successCount++;
                    } else {
                        log(`❌ Greet test failed: got "${result}"`, 'error');
                        failCount++;
                    }
                });
                log(`⏱️  Latency: ${latency.toFixed(2)}ms`, 'info');
            } catch (error) {
                log(`❌ Greet test error: ${error}`, 'error');
                failCount++;
            }
            updateStats();
        }
        
        async function testMath() {
            log('🧪 Testing Math Command...', 'info');
            try {
                const latency = await measureLatency(async () => {
                    const result = await window.core.invoke("divide", "20,4");
                    if (result === "5") {
                        log(`✅ Math test passed: 20 / 4 = ${result}`, 'success');
                        successCount++;
                    } else {
                        log(`❌ Math test failed: got "${result}"`, 'error');
                        failCount++;
                    }
                });
                log(`⏱️  Latency: ${latency.toFixed(2)}ms`, 'info');
            } catch (error) {
                log(`❌ Math test error: ${error}`, 'error');
                failCount++;
            }
            updateStats();
        }
        
        async function testError() {
            log('🧪 Testing Error Handling...', 'info');
            try {
                await window.core.invoke("divide", "10,0");
                log('❌ Error test failed: Should have thrown error', 'error');
                failCount++;
            } catch (error) {
                if (error.includes("Division by zero") || error.includes("zero")) {
                    log(`✅ Error handling passed: Caught "${error}"`, 'success');
                    successCount++;
                } else {
                    log(`❌ Error handling failed: Wrong error "${error}"`, 'error');
                    failCount++;
                }
            }
            updateStats();
        }
        
        async function testSpecialChars() {
            log('🧪 Testing Special Characters...', 'info');
            try {
                const testCases = [
                    "test:with:colons",
                    "test with spaces",
                    "test%with%percent",
                    "test/with/slashes"
                ];
                
                for (const testCase of testCases) {
                    const result = await window.core.invoke("echo", testCase);
                    if (result === `Echo: ${testCase}`) {
                        log(`✅ Special char test passed: "${testCase}"`, 'success');
                        successCount++;
                    } else {
                        log(`❌ Special char test failed: "${testCase}"`, 'error');
                        failCount++;
                    }
                }
            } catch (error) {
                log(`❌ Special char test error: ${error}`, 'error');
                failCount++;
            }
            updateStats();
        }
        
        async function testParallel() {
            log('🧪 Testing Parallel Execution...', 'info');
            try {
                const start = performance.now();
                const promises = [
                    window.core.invoke("echo", "1"),
                    window.core.invoke("echo", "2"),
                    window.core.invoke("echo", "3"),
                    window.core.invoke("echo", "4"),
                    window.core.invoke("echo", "5"),
                ];
                
                const results = await Promise.all(promises);
                const duration = performance.now() - start;
                
                const expected = ["Echo: 1", "Echo: 2", "Echo: 3", "Echo: 4", "Echo: 5"];
                const success = results.every((r, i) => r === expected[i]);
                
                if (success) {
                    log(`✅ Parallel test passed: ${results.length} calls in ${duration.toFixed(2)}ms`, 'success');
                    successCount++;
                } else {
                    log(`❌ Parallel test failed: Results mismatch`, 'error');
                    failCount++;
                }
            } catch (error) {
                log(`❌ Parallel test error: ${error}`, 'error');
                failCount++;
            }
            updateStats();
        }
        
        async function testUnknown() {
            log('🧪 Testing Unknown Command...', 'info');
            try {
                await window.core.invoke("unknown_command_xyz", "test");
                log('❌ Unknown command test failed: Should have thrown error', 'error');
                failCount++;
            } catch (error) {
                if (error.includes("Unknown command")) {
                    log(`✅ Unknown command test passed: Caught "${error}"`, 'success');
                    successCount++;
                } else {
                    log(`❌ Unknown command test failed: Wrong error "${error}"`, 'error');
                    failCount++;
                }
            }
            updateStats();
        }
        
        async function testPerformance() {
            log('🧪 Testing Performance (100 calls)...', 'info');
            const iterations = 100;
            const start = performance.now();
            
            try {
                for (let i = 0; i < iterations; i++) {
                    await window.core.invoke("echo", `test-${i}`);
                }
                
                const duration = performance.now() - start;
                const avgLatency = duration / iterations;
                const throughput = (iterations / (duration / 1000)).toFixed(0);
                
                log(`✅ Performance test completed:`, 'success');
                log(`   • Total time: ${duration.toFixed(2)}ms`, 'info');
                log(`   • Average latency: ${avgLatency.toFixed(2)}ms per call`, 'info');
                log(`   • Throughput: ${throughput} calls/sec`, 'info');
                
                successCount++;
            } catch (error) {
                log(`❌ Performance test error: ${error}`, 'error');
                failCount++;
            }
            updateStats();
        }
        
        async function runAllTests() {
            successCount = 0;
            failCount = 0;
            latencies = [];
            clearOutput();
            
            log('🚀 Running Complete Test Suite...', 'info');
            separator();
            
            await testEcho();
            separator();
            await testGreet();
            separator();
            await testMath();
            separator();
            await testError();
            separator();
            await testSpecialChars();
            separator();
            await testParallel();
            separator();
            await testUnknown();
            separator();
            await testPerformance();
            separator();
            
            const total = successCount + failCount;
            const passRate = ((successCount / total) * 100).toFixed(1);
            
            log('', 'info');
            log('═'.repeat(80), 'separator');
            log(`📊 TEST SUMMARY`, 'info');
            log(`   Total Tests: ${total}`, 'info');
            log(`   ✅ Passed: ${successCount}`, 'success');
            log(`   ❌ Failed: ${failCount}`, 'error');
            log(`   Pass Rate: ${passRate}%`, 'info');
            log('═'.repeat(80), 'separator');
        }
        
        function clearOutput() {
            document.getElementById('output').textContent = '';
            log('Console cleared.', 'info');
        }
        
        // Auto-run basic test on load
        window.addEventListener('DOMContentLoaded', async () => {
            log('🎉 IPC System Initialized', 'success');
            log('Click "Run All Tests" to begin, or run individual tests.', 'info');
            separator();
            
            // Quick smoke test
            try {
                const result = await window.core.invoke("echo", "IPC Active");
                log(`✅ Smoke test passed: ${result}`, 'success');
                successCount++;
                updateStats();
            } catch (error) {
                log(`❌ Smoke test failed: ${error}`, 'error');
                failCount++;
                updateStats();
            }
        });
    </script>
</body>
</html>
